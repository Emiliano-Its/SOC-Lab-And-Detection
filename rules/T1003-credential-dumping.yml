title: Credential Dumping Tool Execution
id: 1043b88d-bcba-4f2e-8fbd-8298dcaec854
status: experimental
description: >
    Detects the execution of known credential dumping tools used to extract
    password hashes and plaintext credentials from Windows memory (LSASS)
    or the SAM database. Adversaries use these tools after gaining initial
    access to harvest credentials and move laterally across the network.
    This rule targets known offensive tool names — a behavioral LSASS
    access rule (Sysmon Event ID 10) should be used alongside this for
    deeper coverage against renamed binaries.
references:
    - https://attack.mitre.org/techniques/T1003/
    - https://attack.mitre.org/techniques/T1003/001/
author: Jose Emiliano Cortez Rivera
date: 2026/06/29
tags:
    - attack.credential_access
    - attack.t1003
    - attack.t1003.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\gsecdump.exe'
            - '\mimikatz.exe'
            - '\procdump.exe'
            - '\wce.exe'
            - '\pwdump.exe'
            - '\pypykatz.exe'
            - '\lsadump.exe'
    condition: selection
falsepositives:
    - Legitimate use of procdump.exe by developers or sysadmins for non-credential debugging
    - Authorized red team or penetration testing activity
level: high
